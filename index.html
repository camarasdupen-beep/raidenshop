<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Raiden">
<title>Raiden — Tienda Saludable</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#0d1d12;
    --bg-2:#0a1410;
    --card:#13261a;
    --card-line:#23402c;
    --lime:#c8e562;
    --lime-deep:#9bc23e;
    --gold:#e8c468;
    --gold-deep:#cf9f3f;
    --green-accent:#4a9460;
    --text:#f2f5ee;
    --muted:#8fa893;
    --danger:#c0392b;
    --whatsapp:#25D366;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    font-family:'Inter', -apple-system, sans-serif;
    background:linear-gradient(160deg, var(--bg), var(--bg-2));
    color:var(--text);
    min-height:100vh;
    max-width:480px;
    margin:0 auto;
    position:relative;
    overflow-x:hidden;
    padding-bottom:96px;
  }

  /* ============== HEADER ============== */
  .topbar{
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(13,29,18,0.92);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--card-line);
    padding:18px 18px 12px;
  }
  .brand-header{
    position:relative;
    text-align:center;
    margin-bottom:14px;
  }
  .brand-logo{
    height:64px;
    width:auto;
    margin:0 auto 6px;
    display:block;
    object-fit:contain;
    filter:drop-shadow(0 6px 18px rgba(200,229,98,0.22));
  }
  .brand-name{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:1.15rem;
    color:var(--lime);
    line-height:1.1;
    letter-spacing:0.3px;
  }
  .brand-sub{
    font-size:0.65rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:2px;
    font-weight:600;
    margin-top:3px;
  }
  .cart-toggle{
    position:absolute;
    top:2px; right:0;
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:12px;
    padding:9px 11px;
    color:var(--text);
    display:flex;
    align-items:center;
    cursor:pointer;
  }
  .cart-toggle svg{width:17px; height:17px;}
  .cart-badge{
    position:absolute;
    top:-6px; right:-6px;
    background:var(--lime);
    color:var(--bg);
    font-size:0.65rem;
    font-weight:800;
    min-width:18px; height:18px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    padding:0 2px;
  }

  .search-wrap{position:relative; margin-bottom:10px;}
  .search-wrap svg{
    position:absolute; left:13px; top:50%; transform:translateY(-50%);
    width:16px; height:16px; color:var(--muted);
  }
  .search-input{
    width:100%;
    padding:11px 14px 11px 38px;
    border-radius:12px;
    border:1px solid var(--card-line);
    background:var(--card);
    color:var(--text);
    font-family:'Inter', sans-serif;
    font-size:0.88rem;
    outline:none;
  }
  .search-input::placeholder{color:var(--muted);}
  .search-input:focus{border-color:var(--lime-deep); box-shadow:0 0 0 3px rgba(200,229,98,0.1);}

  .info-row{
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
    font-size:0.7rem; color:var(--muted);
  }
  .info-row a{color:var(--muted); text-decoration:none; display:flex; align-items:center; gap:4px;}
  .info-row a:active{color:var(--lime);}
  .info-sep{opacity:0.4;}

  /* ============== CATEGORY CHIPS ============== */
  /* ============== NEW ARRIVALS ============== */
  .new-arrivals{
    padding:14px 0 12px;
    border-bottom:1px solid var(--card-line);
  }
  .new-arrivals-title{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:0.88rem;
    color:var(--gold);
    padding:0 18px;
    margin-bottom:10px;
  }
  .new-arrivals-scroll{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding:0 18px 4px;
    scrollbar-width:none;
  }
  .new-arrivals-scroll::-webkit-scrollbar{display:none;}
  .new-card{
    flex-shrink:0;
    width:128px;
    background:var(--card);
    border:1px solid rgba(232,196,104,0.3);
    border-radius:14px;
    padding:10px;
    cursor:pointer;
    position:relative;
  }
  .new-card-badge{
    position:absolute;
    top:7px; left:7px;
    background:var(--gold);
    color:var(--bg);
    font-size:0.6rem;
    font-weight:800;
    padding:2px 7px;
    border-radius:8px;
    z-index:2;
  }
  .new-card-icon{
    width:100%;
    height:78px;
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.8rem;
    margin-bottom:8px;
    overflow:hidden;
  }
  .new-card-icon img{width:100%; height:100%; object-fit:cover; display:block;}
  .new-card-name{
    font-size:0.72rem;
    color:var(--text);
    line-height:1.25;
    margin-bottom:5px;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .new-card-price{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:0.84rem;
    color:var(--gold);
  }
  .new-card-add{
    position:absolute;
    bottom:9px; right:9px;
    width:26px; height:26px;
    border-radius:8px;
    background:linear-gradient(135deg, var(--lime), var(--lime-deep));
    border:none;
    color:var(--bg);
    font-size:1rem;
    font-weight:800;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }

  /* Badge "nuevo" en card normal de la grilla */
  .new-pill{
    display:inline-block;
    background:var(--gold);
    color:var(--bg);
    font-size:0.6rem;
    font-weight:800;
    padding:1px 7px;
    border-radius:8px;
    margin-bottom:3px;
  }

  .cats-wrap{
    position:sticky;
    top:186px;
    z-index:90;
    background:var(--bg);
    padding:10px 18px 10px;
    display:flex;
    gap:7px;
    overflow-x:auto;
    scrollbar-width:none;
    border-bottom:1px solid var(--card-line);
  }
  .cats-wrap::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;
    padding:7px 14px;
    border-radius:20px;
    font-size:0.76rem;
    font-weight:600;
    white-space:nowrap;
    cursor:pointer;
    border:1px solid var(--card-line);
    background:var(--card);
    color:var(--muted);
    transition:background .15s, color .15s, border-color .15s;
  }
  .chip.active{
    background:var(--lime);
    color:var(--bg);
    border-color:var(--lime);
  }

  /* ============== PRODUCT LIST ============== */
  .count-bar{padding:12px 18px 2px; font-size:0.72rem; color:var(--muted);}
  .grid{padding:6px 18px 0; display:flex; flex-direction:column; gap:9px;}

  .prod{
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:16px;
    padding:11px 12px;
    display:flex;
    align-items:center;
    gap:11px;
    transition:border-color .15s;
  }
  .prod.in-cart{border-color:var(--lime-deep); background:rgba(200,229,98,0.04);}
  .prod-icon{
    width:46px; height:46px;
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.3rem;
    flex-shrink:0;
    overflow:hidden;
    cursor:pointer;
    position:relative;
  }
  .prod-icon img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .prod-icon.has-img:active{transform:scale(0.95);}

  /* ============== LOADING / ERROR STATE ============== */
  .catalog-status{
    text-align:center;
    padding:50px 24px;
    color:var(--muted);
    font-size:0.85rem;
  }
  .spinner{
    width:26px; height:26px;
    border-radius:50%;
    border:3px solid var(--card-line);
    border-top-color:var(--lime);
    margin:0 auto 14px;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .retry-btn{
    margin-top:14px;
    display:inline-block;
    background:var(--card);
    border:1px solid var(--lime-deep);
    color:var(--lime);
    padding:9px 18px;
    border-radius:10px;
    font-size:0.8rem;
    font-weight:700;
    cursor:pointer;
  }

  /* ============== IMAGE MODAL ============== */
  .img-modal-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.85);
    z-index:300;
    display:none;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .img-modal-overlay.open{display:flex; animation:fade-in-up .2s ease-out;}
  .img-modal-content{
    max-width:100%;
    max-height:80vh;
    border-radius:16px;
    overflow:hidden;
    background:var(--card);
    border:1px solid var(--card-line);
  }
  .img-modal-content img{
    display:block;
    max-width:100%;
    max-height:80vh;
    object-fit:contain;
  }
  .img-modal-close{
    position:absolute;
    top:24px; right:24px;
    width:36px; height:36px;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    color:#fff;
    font-size:1.1rem;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .prod-info{flex:1; min-width:0;}
  .prod-name{
    font-size:0.82rem;
    font-weight:500;
    color:var(--text);
    line-height:1.3;
    margin-bottom:3px;
  }
  .prod-price{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:1rem;
    color:var(--gold);
  }
  .prod-right{display:flex; align-items:center; flex-shrink:0;}
  .qty-wrap{
    display:flex; align-items:center;
    background:var(--bg-2);
    border:1px solid var(--card-line);
    border-radius:10px;
    overflow:hidden;
  }
  .qty-btn{
    width:30px; height:30px;
    background:none; border:none;
    color:var(--lime);
    font-size:1.05rem;
    font-weight:700;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .qty-btn:active{background:rgba(200,229,98,0.12);}
  .qty-num{min-width:24px; text-align:center; font-size:0.85rem; font-weight:700;}
  .add-btn{
    width:34px; height:34px;
    background:linear-gradient(135deg, var(--lime), var(--lime-deep));
    border:none;
    border-radius:10px;
    color:var(--bg);
    font-size:1.2rem;
    font-weight:800;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(200,229,98,0.2);
  }
  .add-btn:active{transform:scale(0.94);}

  .empty-msg{
    text-align:center;
    color:var(--muted);
    padding:40px 20px;
    font-size:0.85rem;
  }

  /* ============== CART DRAWER ============== */
  .overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.55);
    z-index:199;
    opacity:0; pointer-events:none;
    transition:opacity .25s;
  }
  .overlay.open{opacity:1; pointer-events:all;}
  .drawer{
    position:fixed;
    bottom:0; left:50%;
    transform:translateX(-50%) translateY(100%);
    width:100%; max-width:480px;
    background:var(--card);
    border:1px solid var(--card-line);
    border-bottom:none;
    border-radius:22px 22px 0 0;
    z-index:200;
    transition:transform .3s ease;
    max-height:82vh;
    display:flex;
    flex-direction:column;
    box-shadow:0 -8px 30px rgba(0,0,0,0.4);
  }
  .drawer.open{transform:translateX(-50%) translateY(0);}
  .drawer-handle{
    width:36px; height:4px;
    background:var(--card-line);
    border-radius:2px;
    margin:12px auto 4px;
    flex-shrink:0;
  }
  .drawer-header{
    padding:8px 22px 12px;
    border-bottom:1px solid var(--card-line);
    flex-shrink:0;
  }
  .drawer-title{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:1.05rem;
    color:var(--lime);
  }
  .drawer-items{flex:1; overflow-y:auto; padding:10px 22px;}
  .cart-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:11px 0;
    border-bottom:1px solid var(--card-line);
    gap:10px;
  }
  .cart-item:last-child{border-bottom:none;}
  .ci-name{font-size:0.8rem; color:var(--text); flex:1; line-height:1.3;}
  .ci-qty{font-size:0.74rem; color:var(--muted); flex-shrink:0;}
  .ci-price{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:0.92rem;
    color:var(--gold);
    flex-shrink:0;
  }
  .ci-del{
    background:none; border:none; cursor:pointer;
    color:var(--muted); font-size:1rem; padding:0 2px;
  }
  .cart-empty{text-align:center; padding:32px 10px; color:var(--muted); font-size:0.85rem;}

  .drawer-footer{
    padding:14px 22px;
    padding-bottom:calc(14px + env(safe-area-inset-bottom));
    border-top:1px solid var(--card-line);
    flex-shrink:0;
  }

  /* Datos del cliente */
  .customer-fields{
    display:flex; gap:8px; margin-bottom:12px;
  }
  .customer-input{
    flex:1;
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--card-line);
    background:var(--bg-2);
    color:var(--text);
    font-family:'Inter', sans-serif;
    font-size:0.82rem;
    outline:none;
  }
  .customer-input:focus{border-color:var(--lime-deep); box-shadow:0 0 0 3px rgba(200,229,98,0.1);}
  .customer-input::placeholder{color:var(--muted);}
  .customer-input.invalid{border-color:var(--danger);}

  /* Toggle retiro / envío */
  .fulfill-toggle{
    display:flex; gap:8px; margin-bottom:12px;
  }
  .fulfill-opt{
    flex:1;
    text-align:center;
    padding:9px 6px;
    border-radius:10px;
    border:1px solid var(--card-line);
    background:var(--bg-2);
    color:var(--muted);
    font-size:0.76rem;
    font-weight:600;
    cursor:pointer;
  }
  .fulfill-opt.active{
    background:rgba(200,229,98,0.12);
    border-color:var(--lime-deep);
    color:var(--lime);
  }
  .address-field{
    display:none;
    width:100%;
    padding:11px 13px;
    border-radius:10px;
    border:1px solid var(--card-line);
    background:var(--bg-2);
    color:var(--text);
    font-family:'Inter', sans-serif;
    font-size:0.82rem;
    margin-bottom:12px;
    outline:none;
  }
  .address-field.visible{display:block;}
  .address-field:focus{border-color:var(--lime-deep);}
  .address-field::placeholder{color:var(--muted);}

  .total-row{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:13px;
  }
  .total-label{font-size:0.78rem; color:var(--muted);}
  .total-amount{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:1.6rem;
    color:var(--lime);
  }
  .points-row{
    text-align:center;
    font-size:0.76rem;
    color:var(--gold);
    background:rgba(232,196,104,0.1);
    border:1px solid rgba(232,196,104,0.22);
    border-radius:10px;
    padding:7px 10px;
    margin-bottom:13px;
  }
  .points-row strong{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:0.86rem;
  }

  .points-toast{
    position:fixed;
    bottom:90px; left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--card);
    color:var(--text);
    padding:10px 18px;
    border-radius:30px;
    font-size:0.8rem;
    font-weight:500;
    z-index:999;
    box-shadow:0 6px 22px rgba(0,0,0,0.4);
    border:1px solid rgba(232,196,104,0.35);
    display:flex;
    align-items:center;
    gap:7px;
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease, transform .3s ease;
  }
  .points-toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .points-toast strong{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:0.95rem;
    color:var(--gold);
  }
  .wa-btn{
    width:100%;
    background:var(--whatsapp);
    color:#fff;
    border:none;
    border-radius:13px;
    padding:14px;
    font-family:'Inter', sans-serif;
    font-size:0.92rem;
    font-weight:700;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .wa-btn:active{opacity:0.88;}
  .wa-btn:disabled{opacity:0.4; cursor:not-allowed;}

  /* ============== BOTTOM BAR ============== */
  .bottom-bar{
    position:fixed;
    bottom:14px; left:50%;
    transform:translateX(-50%);
    width:calc(100% - 28px);
    max-width:452px;
    background:linear-gradient(135deg, var(--card), var(--bg-2));
    border:1px solid var(--lime-deep);
    border-radius:16px;
    padding:11px 16px;
    display:none;
    align-items:center;
    justify-content:space-between;
    z-index:98;
    box-shadow:0 8px 28px rgba(0,0,0,0.45);
  }
  .bottom-bar.visible{display:flex;}
  .bb-items{font-size:0.68rem; color:var(--muted);}
  .bb-total{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:1.15rem;
    color:var(--lime);
  }
  .bb-btn{
    background:var(--lime);
    color:var(--bg);
    border:none;
    border-radius:10px;
    padding:9px 16px;
    font-family:'Sora', sans-serif;
    font-size:0.78rem;
    font-weight:800;
    cursor:pointer;
    white-space:nowrap;
  }

  /* ============== TOAST ============== */
  .toast{
    position:fixed;
    bottom:90px; left:50%;
    transform:translateX(-50%);
    background:var(--card);
    color:var(--text);
    padding:11px 20px;
    border-radius:30px;
    font-size:0.82rem;
    z-index:999;
    box-shadow:0 4px 18px rgba(0,0,0,0.4);
    border:1px solid rgba(200,229,98,0.25);
    animation:toast-in .25s ease-out;
    white-space:nowrap;
  }
  .toast.toast-out{animation:toast-out .2s ease-in forwards;}

  @keyframes toast-in{from{opacity:0; transform:translate(-50%,10px);} to{opacity:1; transform:translate(-50%,0);}}
  @keyframes toast-out{from{opacity:1; transform:translate(-50%,0);} to{opacity:0; transform:translate(-50%,10px);}}
  @keyframes fade-in-up{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  .prod{animation:fade-in-up .3s ease-out backwards;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand-header">
    <div class="cart-toggle" onclick="toggleCart()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="cart-badge" id="cartBadge">0</span>
    </div>
    <img id="logoImg" class="brand-logo" src="" alt="Raiden">
    <div class="brand-name">RAIDEN</div>
    <div class="brand-sub">Tienda Saludable</div>
  </div>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Buscar producto..." oninput="renderProducts()">
  </div>

  <div class="info-row">
    <a href="https://maps.google.com/?q=Fratini+527,+Macach%C3%ADn,+La+Pampa" target="_blank" rel="noopener">📍 Fratini 527, Macachín</a>
    <span class="info-sep">·</span>
    <a href="https://instagram.com/raiden.tiendasaludable" target="_blank" rel="noopener">@raiden.tiendasaludable</a>
  </div>
</div>

<div class="new-arrivals" id="newArrivals" style="display:none">
  <div class="new-arrivals-title">🔥 Recién llegados</div>
  <div class="new-arrivals-scroll" id="newArrivalsScroll"></div>
</div>

<div class="cats-wrap" id="catsWrap">
  <div class="chip active" data-cat="all" onclick="selectCat(this)">Todo</div>
</div>

// ============== PRODUCTOS (desde Loyverse vía Netlify Function) ==============
let PRODUCTOS = [];

async function cargarProductos(){
  const statusEl = document.getElementById('catalogStatus');
  const gridEl = document.getElementById('grid');
  statusEl.style.display = 'block';
  statusEl.innerHTML = '<div class="spinner"></div>Cargando catálogo...';
  gridEl.innerHTML = '';

  try{
    const res = await fetch('/.netlify/functions/loyverse-items');
    if(!res.ok){
      let detalle = '';
      try{ detalle = await res.text(); }catch(_){}
      throw new Error(`Error ${res.status}: ${detalle || res.statusText}`);
    }
    const data = await res.json();
    if(data.error) throw new Error(data.error);

    PRODUCTOS = (data.items || []).map(it => ({
      n: it.name,
      p: it.price,
      c: it.category,
      img: it.image || null,
      isNew: !!it.isNew
    }));

    statusEl.style.display = 'none';
    buildCategoryChips();
    renderNewArrivals();
    renderProducts();
  }catch(e){
    console.error(e);
    statusEl.style.display = 'block';
    statusEl.innerHTML = `
      No pudimos cargar el catálogo.<br>
      <span style="font-size:0.75rem;opacity:0.8">${escapeHtml(e.message || String(e))}</span><br>
      <span class="retry-btn" onclick="cargarProductos()">Reintentar</span>
    `;
  }
}


// ============== ESTADO ==============
let cart = {};
let activeCat = 'all';
let fulfillment = 'pickup';

// ============== CATEGORÍAS ==============
function buildCategoryChips(){
  const uniqueCats = [...new Set(PRODUCTOS.map(p => p.c))].sort((a,b) => {
    const ai = CATS_ORDER.indexOf(a), bi = CATS_ORDER.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  const catsWrap = document.getElementById('catsWrap');
  // Mantener el chip "Todo" y agregar el resto
  catsWrap.querySelectorAll('.chip:not([data-cat="all"])').forEach(el => el.remove());
  uniqueCats.forEach(cat => {
    const d = document.createElement('div');
    d.className = 'chip';
    d.dataset.cat = cat;
    d.textContent = cat;
    d.onclick = function(){ selectCat(this); };
    catsWrap.appendChild(d);
  });
}

function selectCat(el){
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeCat = el.dataset.cat;
  renderProducts();
}

function fmt(n){ return '$' + n.toLocaleString('es-AR'); }

// ============== RECIÉN LLEGADOS ==============
function renderNewArrivals(){
  const wrap = document.getElementById('newArrivals');
  const scroll = document.getElementById('newArrivalsScroll');
  const newOnes = PRODUCTOS.filter(p => p.isNew);

  if(newOnes.length === 0){
    wrap.style.display = 'none';
    return;
  }

  wrap.style.display = 'block';
  scroll.innerHTML = newOnes.map(p => {
    const ic = CAT_ICONS[p.c] || '🛒';
    const bg = CAT_BG[p.c] || 'rgba(242,245,238,0.06)';
    const safeName = p.n.replace(/'/g, "\\'");
    const iconInner = p.img
      ? `<img src="${p.img}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='${ic}';this.parentElement.style.background='${bg}'">`
      : ic;
    const iconBg = p.img ? 'rgba(242,245,238,0.04)' : bg;

    return `<div class="new-card" onclick="addToCart('${safeName}')">
      <div class="new-card-badge">🔥 Nuevo</div>
      <div class="new-card-icon" style="background:${iconBg}">${iconInner}</div>
      <div class="new-card-name">${escapeHtml(p.n)}</div>
      <div class="new-card-price">${fmt(p.p)}</div>
      <button class="new-card-add" onclick="event.stopPropagation();addToCart('${safeName}')">+</button>
    </div>`;
  }).join('');
}

function renderProducts(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = PRODUCTOS.filter(p => {
    const matchCat = activeCat === 'all' || p.c === activeCat;
    const matchQ = !q || p.n.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('countBar').textContent = `${filtered.length} producto${filtered.length !== 1 ? 's' : ''}`;

  const grid = document.getElementById('grid');
  if(filtered.length === 0){
    grid.innerHTML = `<div class="empty-msg">No encontramos productos con esa búsqueda.</div>`;
    return;
  }

  grid.innerHTML = filtered.map((p, i) => {
    const qty = cart[p.n] || 0;
    const ic = CAT_ICONS[p.c] || '🛒';
    const bg = CAT_BG[p.c] || 'rgba(242,245,238,0.06)';
    const safeName = p.n.replace(/'/g, "\\'");
    const safeImg = p.img ? p.img.replace(/'/g, "\\'") : '';

    const iconInner = p.img
      ? `<img src="${p.img}" alt="" loading="lazy" onerror="this.parentElement.classList.remove('has-img');this.parentElement.innerHTML='${ic}';this.parentElement.style.background='${bg}'">`
      : ic;
    const iconBg = p.img ? 'rgba(242,245,238,0.04)' : bg;
    const iconClick = p.img ? ` onclick="openImgModal('${safeImg}','${safeName}')"` : '';

    return `<div class="prod${qty > 0 ? ' in-cart' : ''}" style="animation-delay:${Math.min(i,12) * 0.03}s">
      <div class="prod-icon${p.img ? ' has-img' : ''}" style="background:${iconBg}"${iconClick}>${iconInner}</div>
      <div class="prod-info">
        ${p.isNew ? '<div class="new-pill">🔥 Nuevo</div>' : ''}
        <div class="prod-name">${escapeHtml(p.n)}</div>
        <div class="prod-price">${fmt(p.p)}</div>
      </div>
      <div class="prod-right">
        ${qty > 0 ? `
        <div class="qty-wrap">
          <button class="qty-btn" onclick="changeQty('${safeName}',-1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="changeQty('${safeName}',1)">+</button>
        </div>` : `
        <button class="add-btn" onclick="addToCart('${safeName}')">+</button>`}
      </div>
    </div>`;
  }).join('');
}

function openImgModal(src, name){
  document.getElementById('imgModalPic').src = src;
  document.getElementById('imgModalPic').alt = name;
  document.getElementById('imgModalOverlay').classList.add('open');
}

function closeImgModal(){
  document.getElementById('imgModalOverlay').classList.remove('open');
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function addToCart(name){
  cart[name] = (cart[name] || 0) + 1;
  updateCartUI();
  renderProducts();

  const prod = PRODUCTOS.find(p => p.n === name);
  const pts = prod ? Math.round(prod.p * 0.01) : 0;
  showPointsToast(pts);
}

function showPointsToast(pts){
  const toast = document.getElementById('pointsToast');
  document.getElementById('pointsToastAmount').textContent = pts.toLocaleString('es-AR');
  toast.classList.remove('show');
  void toast.offsetWidth; // reinicia la animación si ya estaba visible
  toast.classList.add('show');
  clearTimeout(window._pointsToastTimer);
  window._pointsToastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
}

function changeQty(name, delta){
  cart[name] = (cart[name] || 0) + delta;
  if(cart[name] <= 0) delete cart[name];
  updateCartUI();
  renderProducts();
}

function removeFromCart(name){
  delete cart[name];
  updateCartUI();
  renderProducts();
}

function cartTotals(){
  const items = Object.keys(cart);
  const totalItems = items.reduce((s,k) => s + cart[k], 0);
  const totalPrice = items.reduce((s,k) => {
    const prod = PRODUCTOS.find(p => p.n === k);
    return s + (prod ? prod.p * cart[k] : 0);
  }, 0);
  const totalPoints = Math.round(totalPrice * 0.01);
  return { items, totalItems, totalPrice, totalPoints };
}

function updateCartUI(){
  const { items, totalItems, totalPrice, totalPoints } = cartTotals();

  document.getElementById('cartBadge').textContent = totalItems;
  document.getElementById('bbItems').textContent = `${totalItems} producto${totalItems !== 1 ? 's' : ''}`;
  document.getElementById('bbTotal').textContent = fmt(totalPrice);
  document.getElementById('totalAmount').textContent = fmt(totalPrice);
  document.getElementById('pointsAmount').textContent = totalPoints.toLocaleString('es-AR');
  document.getElementById('pointsRow').style.display = totalItems > 0 ? 'block' : 'none';

  const bar = document.getElementById('bottomBar');
  if(totalItems > 0 && !document.getElementById('drawer').classList.contains('open')){
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }

  const waBtn = document.getElementById('waBtn');
  waBtn.disabled = totalItems === 0;

  const di = document.getElementById('drawerItems');
  if(items.length === 0){
    di.innerHTML = `<div class="cart-empty">Tu carrito está vacío 🛒</div>`;
  } else {
    di.innerHTML = items.map(k => {
      const prod = PRODUCTOS.find(p => p.n === k);
      const subtotal = prod ? prod.p * cart[k] : 0;
      return `<div class="cart-item">
        <div class="ci-name">${escapeHtml(k)}</div>
        <div class="ci-qty">x${cart[k]}</div>
        <div class="ci-price">${fmt(subtotal)}</div>
        <button class="ci-del" onclick="removeFromCart('${k.replace(/'/g,"\\'")}')">✕</button>
      </div>`;
    }).join('');
  }
}

function toggleCart(){
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
  updateCartUI();
}

function setFulfillment(mode){
  fulfillment = mode;
  document.getElementById('optPickup').classList.toggle('active', mode === 'pickup');
  document.getElementById('optDelivery').classList.toggle('active', mode === 'delivery');
  document.getElementById('addressField').classList.toggle('visible', mode === 'delivery');
}

function sendWhatsApp(){
  const { items, totalPrice } = cartTotals();
  if(items.length === 0) return;

  const nameField = document.getElementById('customerName');
  const dniField = document.getElementById('customerDni');
  const customerName = nameField.value.trim();
  const customerDni = dniField.value.trim();

  nameField.classList.remove('invalid');
  dniField.classList.remove('invalid');

  if(!customerName){
    nameField.classList.add('invalid');
    showToast('Ingresá tu nombre y apellido');
    nameField.focus();
    return;
  }
  if(!customerDni){
    dniField.classList.add('invalid');
    showToast('Ingresá tu DNI');
    dniField.focus();
    return;
  }

  if(fulfillment === 'delivery'){
    const addr = document.getElementById('addressField').value.trim();
    if(!addr){
      showToast('Ingresá la dirección de entrega');
      document.getElementById('addressField').focus();
      return;
    }
  }

  let msg = '🌿 *Pedido Raiden Tienda Saludable*\n\n';
  msg += `*Cliente:* ${customerName}\n`;
  msg += `*DNI:* ${customerDni}\n\n`;
  items.forEach(k => {
    const prod = PRODUCTOS.find(p => p.n === k);
    const sub = prod ? prod.p * cart[k] : 0;
    msg += `• ${k} x${cart[k]} — ${fmt(sub)}\n`;
  });
  msg += `\n*Total: ${fmt(totalPrice)}*\n\n`;

  if(fulfillment === 'pickup'){
    msg += '📍 Retiro en local (Fratini 527, Macachín)';
  } else {
    const addr = document.getElementById('addressField').value.trim();
    msg += `🚚 Envío a domicilio en Macachín\nDirección: ${addr}`;
  }

  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
}

function showToast(msg){
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);

  setTimeout(() => {
    toast.classList.add('toast-out');
    setTimeout(() => toast.remove(), 200);
  }, 1800);
}

cargarProductos();
updateCartUI();
</script>

</body>
</html>
